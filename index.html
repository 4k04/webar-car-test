<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">

  <title>WebAR Car Test</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #infoBox {
      position: fixed;
      left: 50%;
      bottom: 90px;
      transform: translateX(-50%);
      z-index: 999;

      box-sizing: border-box;
      width: min(90vw, 420px);
      padding: 12px 18px;

      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);

      color: #222;
      font-size: 16px;
      line-height: 1.5;
      text-align: center;

      display: none;
    }

    #startBtn {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 999;

      padding: 12px 24px;

      border: none;
      border-radius: 999px;

      background: #2d7ff9;
      color: #fff;

      font-size: 16px;
      cursor: pointer;
    }

    #startBtn:disabled {
      background: #888;
      cursor: default;
    }

    #statusBox {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;

      box-sizing: border-box;
      width: min(90vw, 420px);
      padding: 8px 14px;

      border-radius: 10px;
      background: rgba(0, 0, 0, 0.65);

      color: #fff;
      font-size: 14px;
      text-align: center;
    }
  </style>

  <script>
    /**
     * GLB内の扉オブジェクトをスライドさせます。
     *
     * Blender側の扉オブジェクト名は
     * Slide_Door
     * とします。
     */
    AFRAME.registerComponent("sliding-door", {
      schema: {
        doorName: {
          type: "string",
          default: "Slide_Door"
        },

        /**
         * 扉を開いたときの移動距離です。
         * 前回の-0.28から、少しだけ小さい-0.26へ変更。
         */
        openOffset: {
          type: "vec3",
          default: {
            x: -0.26,
            y: 0,
            z: 0
          }
        },

        duration: {
          type: "number",
          default: 1200
        }
      },

      init: function () {
        this.doorObject = null;
        this.closedPosition = new THREE.Vector3();
        this.openPosition = new THREE.Vector3();
        this.isMoving = false;

        this.el.addEventListener("model-loaded", () => {
          const model = this.el.getObject3D("mesh");

          if (!model) {
            console.error("GLBモデルを取得できませんでした。");
            return;
          }

          this.doorObject = model.getObjectByName(
            this.data.doorName
          );

          if (!this.doorObject) {
            console.warn(
              `扉オブジェクト「${this.data.doorName}」が見つかりません。`
            );

            this.el.emit("door-not-found");
            return;
          }

          this.closedPosition.copy(
            this.doorObject.position
          );

          this.openPosition
            .copy(this.closedPosition)
            .add(
              new THREE.Vector3(
                this.data.openOffset.x,
                this.data.openOffset.y,
                this.data.openOffset.z
              )
            );

          this.el.emit("door-ready");
        });
      },

      moveDoor: function (open) {
        if (!this.doorObject || this.isMoving) {
          return Promise.resolve(false);
        }

        this.isMoving = true;

        const startPosition =
          this.doorObject.position.clone();

        const endPosition = open
          ? this.openPosition.clone()
          : this.closedPosition.clone();

        const startTime = performance.now();
        const duration = this.data.duration;

        return new Promise((resolve) => {
          const animate = (currentTime) => {
            const elapsed = currentTime - startTime;

            const progress = Math.min(
              elapsed / duration,
              1
            );

            /**
             * 開始時と停止時を少し滑らかにします。
             */
            const eased =
              progress < 0.5
                ? 2 * progress * progress
                : 1 -
                  Math.pow(-2 * progress + 2, 2) / 2;

            this.doorObject.position.lerpVectors(
              startPosition,
              endPosition,
              eased
            );

            if (progress < 1) {
              requestAnimationFrame(animate);
              return;
            }

            this.doorObject.position.copy(
              endPosition
            );

            this.isMoving = false;
            resolve(true);
          };

          requestAnimationFrame(animate);
        });
      }
    });
  </script>
</head>

<body>
  <div id="statusBox">
    車両モデルを読み込んでいます
  </div>

  <div id="infoBox"></div>

  <button
    id="startBtn"
    type="button"
    disabled
  >
    読み込み中
  </button>

  <a-scene
    mindar-image="
      imageTargetSrc: ./targets.mind;
      autoStart: true;
      filterMinCF: 0.0001;
      filterBeta: 10;
      warmupTolerance: 5;
      missTolerance: 10;
    "
    renderer="
      colorManagement: true;
      physicallyCorrectLights: true;
      antialias: true;
    "
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false"
  >

    <a-assets timeout="120000">
      <a-asset-item
        id="carAsset"
        src="./assets/car_test.glb"
      >
      </a-asset-item>
    </a-assets>

    <a-camera
      id="camera"
      position="0 0 0"
      look-controls="enabled: false"
    >
      <!--
        認識後に表示する固定車両です。
        最初からtargetの外に置くことで、
        MindARの表示・非表示に巻き込まれません。
      -->
      <a-entity
        id="screenAnchor"
        visible="false"
      >
        <a-entity id="gyroPivot">
          <a-entity
            id="fixedCarRoot"
            position="0 0 0"
            rotation="-90 0 180"
            scale="0.20 0.20 0.20"
            visible="true"
          >
            <a-gltf-model
              id="fixedCarModel"
              src="#carAsset"
              visible="true"
              sliding-door="
                doorName: Slide_Door;
                openOffset: -0.26 0 0;
                duration: 1200;
              "
            >
            </a-gltf-model>
          </a-entity>
        </a-entity>
      </a-entity>
    </a-camera>

    <a-light
      type="ambient"
      intensity="1.2"
    >
    </a-light>

    <a-light
      type="directional"
      intensity="1.1"
      position="1 3 2"
    >
    </a-light>

    <!--
      認識位置を確認するためだけのプレビュー車両です。
      固定完了後は非表示にします。
    -->
    <a-entity
      id="target"
      mindar-image-target="targetIndex: 0"
    >
      <a-entity
        id="previewCarRoot"
        position="0.3 0 0.12"
        rotation="-90 0 180"
        scale="0.20 0.20 0.20"
      >
        <a-gltf-model
          id="previewCarModel"
          src="#carAsset"
        >
        </a-gltf-model>
      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    const infoBox =
      document.getElementById("infoBox");

    const statusBox =
      document.getElementById("statusBox");

    const startBtn =
      document.getElementById("startBtn");

    const sceneEl =
      document.querySelector("a-scene");

    const cameraEl =
      document.getElementById("camera");

    const target =
      document.getElementById("target");

    const previewCarRoot =
      document.getElementById("previewCarRoot");

    const screenAnchor =
      document.getElementById("screenAnchor");

    const gyroPivot =
      document.getElementById("gyroPivot");

    const fixedCarRoot =
      document.getElementById("fixedCarRoot");

    const fixedCarModel =
      document.getElementById("fixedCarModel");

    let fixedModelReady = false;
    let targetVisible = false;
    let screenLocked = false;
    let lockScheduled = false;
    let experienceRunning = false;

    let gyroListenerAdded = false;
    let gyroPermissionGranted = false;
    let gyroDataAvailable = false;
    let gyroReferenceReady = false;

    /**
     * 画面上の固定位置です。
     * X: 左0、中央0.5、右1
     * Y: 上0、中央0.5、下1
     */
    const SCREEN_X_RATIO = 0.50;
    const SCREEN_Y_RATIO = 0.58;

    /**
     * カメラ前方の仮想距離です。
     */
    const SCREEN_ANCHOR_DEPTH = 2.0;

    /**
     * 希望する表示倍率です。
     * はみ出す端末では自動的に縮小します。
     */
    const DISPLAY_SCALE_MULTIPLIER = 1.7;
    const SCREEN_SAFE_MARGIN = 0.82;

    /**
     * 車両のフロント方向です。
     * 逆向きに動く場合は-1へ変更します。
     */
    const CAR_FRONT_LOCAL_AXIS =
      new THREE.Vector3(1, 0, 0);

    /**
     * 出発距離と時間です。
     */
    const DEPARTURE_SCREEN_WIDTH_RATIO = 0.75;
    const CAR_MOVE_DURATION = 3000;

    /**
     * ジャイロ回転の滑らかさです。
     */
    const GYRO_SMOOTHING = 0.12;

    const lockedAnchorPosition =
      new THREE.Vector3();

    const lockedCarQuaternion =
      new THREE.Quaternion();

    const lockedCarScale =
      new THREE.Vector3();

    const latestDeviceQuaternion =
      new THREE.Quaternion();

    const gyroReferenceQuaternion =
      new THREE.Quaternion();

    const gyroRelativeQuaternion =
      new THREE.Quaternion();

    const gyroTargetQuaternion =
      new THREE.Quaternion();

    const deviceEuler =
      new THREE.Euler();

    const screenRotationQuaternion =
      new THREE.Quaternion();

    const deviceCameraCorrection =
      new THREE.Quaternion(
        -Math.sqrt(0.5),
        0,
        0,
        Math.sqrt(0.5)
      );

    const deviceZAxis =
      new THREE.Vector3(0, 0, 1);

    function sleep(ms) {
      return new Promise((resolve) => {
        window.setTimeout(resolve, ms);
      });
    }

    function showMessage(text) {
      infoBox.textContent = text;
      infoBox.style.display = "block";
    }

    function updateStartButton() {
      if (experienceRunning) {
        startBtn.disabled = true;
        return;
      }

      if (!fixedModelReady) {
        startBtn.disabled = true;
        startBtn.textContent = "読み込み中";
        return;
      }

      if (!screenLocked) {
        startBtn.disabled = true;
        startBtn.textContent =
          "認識画像を映してください";
        return;
      }

      startBtn.disabled = false;
      startBtn.textContent = "体験スタート";
    }

    /**
     * 画面比率をカメラ前方の3D座標へ変換します。
     */
    function getFixedScreenPosition() {
      const camera =
        cameraEl.getObject3D("camera");

      if (!camera) {
        return new THREE.Vector3(
          0,
          0,
          -SCREEN_ANCHOR_DEPTH
        );
      }

      const depth =
        SCREEN_ANCHOR_DEPTH;

      const verticalFov =
        THREE.MathUtils.degToRad(
          camera.fov
        );

      const visibleHeight =
        2 *
        Math.tan(verticalFov / 2) *
        depth;

      const aspect =
        camera.aspect ||
        window.innerWidth /
          window.innerHeight;

      const visibleWidth =
        visibleHeight * aspect;

      const ndcX =
        SCREEN_X_RATIO * 2 - 1;

      const ndcY =
        1 - SCREEN_Y_RATIO * 2;

      return new THREE.Vector3(
        ndcX * visibleWidth / 2,
        ndcY * visibleHeight / 2,
        -depth
      );
    }

    /**
     * 画面内へ収まる最大倍率を求めます。
     */
    function getFittingDisplayScale() {
      const camera =
        cameraEl.getObject3D("camera");

      if (!camera) {
        return DISPLAY_SCALE_MULTIPLIER;
      }

      sceneEl.object3D.updateMatrixWorld(true);
      fixedCarRoot.object3D.updateMatrixWorld(true);

      const box =
        new THREE.Box3().setFromObject(
          fixedCarRoot.object3D
        );

      const sphere =
        new THREE.Sphere();

      box.getBoundingSphere(sphere);

      if (
        !Number.isFinite(sphere.radius) ||
        sphere.radius <= 0
      ) {
        return DISPLAY_SCALE_MULTIPLIER;
      }

      const depth =
        SCREEN_ANCHOR_DEPTH;

      const verticalFov =
        THREE.MathUtils.degToRad(
          camera.fov
        );

      const visibleHeight =
        2 *
        Math.tan(verticalFov / 2) *
        depth;

      const aspect =
        camera.aspect ||
        window.innerWidth /
          window.innerHeight;

      const visibleWidth =
        visibleHeight * aspect;

      const ndcX =
        SCREEN_X_RATIO * 2 - 1;

      const ndcY =
        1 - SCREEN_Y_RATIO * 2;

      const availableHalfWidth =
        visibleWidth / 2 *
        Math.min(
          1 - ndcX,
          1 + ndcX
        );

      const availableHalfHeight =
        visibleHeight / 2 *
        Math.min(
          1 - ndcY,
          1 + ndcY
        );

      const availableRadius =
        Math.min(
          availableHalfWidth,
          availableHalfHeight
        ) *
        SCREEN_SAFE_MARGIN;

      const maximumScale =
        availableRadius /
        sphere.radius;

      return Math.max(
        0.1,
        Math.min(
          DISPLAY_SCALE_MULTIPLIER,
          maximumScale
        )
      );
    }

    /**
     * 認識後に固定車両を表示します。
     *
     * 認識用モデルと固定用モデルを分けているため、
     * targetが消えても固定車両は消えません。
     */
    function lockFixedCarToScreen() {
      if (
        screenLocked ||
        !fixedModelReady
      ) {
        return;
      }

      screenAnchor.object3D.position.copy(
        getFixedScreenPosition()
      );

      screenAnchor.object3D.quaternion.identity();
      screenAnchor.object3D.scale.set(1, 1, 1);

      gyroPivot.object3D.position.set(0, 0, 0);
      gyroPivot.object3D.quaternion.identity();
      gyroPivot.object3D.scale.set(1, 1, 1);

      fixedCarRoot.object3D.position.set(0, 0, 0);
      fixedCarRoot.object3D.rotation.set(
        THREE.MathUtils.degToRad(-90),
        0,
        THREE.MathUtils.degToRad(180)
      );

      fixedCarRoot.object3D.scale.set(
        0.20,
        0.20,
        0.20
      );

      fixedCarRoot.object3D.visible = true;
      fixedCarModel.object3D.visible = true;

      screenAnchor.object3D.visible = true;
      screenAnchor.setAttribute(
        "visible",
        true
      );

      /**
       * 固定表示が確認できてから、
       * 認識用プレビューだけを隠します。
       */
      previewCarRoot.object3D.visible = false;
      previewCarRoot.setAttribute(
        "visible",
        false
      );

      sceneEl.object3D.updateMatrixWorld(true);

      const fittingScale =
        getFittingDisplayScale();

      gyroPivot.object3D.scale.setScalar(
        fittingScale
      );

      lockedAnchorPosition.copy(
        screenAnchor.object3D.position
      );

      lockedCarQuaternion.copy(
        fixedCarRoot.object3D.quaternion
      );

      lockedCarScale.copy(
        fixedCarRoot.object3D.scale
      );

      screenLocked = true;
      calibrateGyroscope();

      statusBox.textContent =
        "表示位置を固定しました。体験スタートを押してください";

      updateStartButton();
    }

    /**
     * targetFound直後の不安定な1フレームを避けます。
     */
    function scheduleScreenLock() {
      if (
        screenLocked ||
        lockScheduled ||
        !targetVisible ||
        !fixedModelReady
      ) {
        return;
      }

      lockScheduled = true;

      statusBox.textContent =
        "認識画像を検出しました。表示を固定しています";

      window.requestAnimationFrame(() => {
        window.requestAnimationFrame(() => {
          lockScheduled = false;

          if (
            !screenLocked &&
            targetVisible &&
            fixedModelReady
          ) {
            lockFixedCarToScreen();
          }
        });
      });
    }

    /**
     * 端末の向きをQuaternionへ変換します。
     */
    function createDeviceQuaternion(event) {
      const alpha =
        THREE.MathUtils.degToRad(
          event.alpha || 0
        );

      const beta =
        THREE.MathUtils.degToRad(
          event.beta || 0
        );

      const gamma =
        THREE.MathUtils.degToRad(
          event.gamma || 0
        );

      let screenAngle = 0;

      if (
        window.screen.orientation &&
        typeof window.screen.orientation.angle ===
          "number"
      ) {
        screenAngle =
          window.screen.orientation.angle;
      } else if (
        typeof window.orientation === "number"
      ) {
        screenAngle =
          window.orientation;
      }

      const orientation =
        THREE.MathUtils.degToRad(
          screenAngle
        );

      deviceEuler.set(
        beta,
        alpha,
        -gamma,
        "YXZ"
      );

      const quaternion =
        new THREE.Quaternion();

      quaternion.setFromEuler(deviceEuler);
      quaternion.multiply(
        deviceCameraCorrection
      );

      screenRotationQuaternion
        .setFromAxisAngle(
          deviceZAxis,
          -orientation
        );

      quaternion.multiply(
        screenRotationQuaternion
      );

      return quaternion.normalize();
    }

    function handleDeviceOrientation(event) {
      if (
        event.alpha === null &&
        event.beta === null &&
        event.gamma === null
      ) {
        return;
      }

      latestDeviceQuaternion.copy(
        createDeviceQuaternion(event)
      );

      gyroDataAvailable = true;

      if (!screenLocked) {
        return;
      }

      if (!gyroReferenceReady) {
        gyroReferenceQuaternion.copy(
          latestDeviceQuaternion
        );

        gyroReferenceReady = true;
        return;
      }

      gyroRelativeQuaternion
        .copy(gyroReferenceQuaternion)
        .invert()
        .multiply(
          latestDeviceQuaternion
        );

      gyroTargetQuaternion
        .copy(gyroRelativeQuaternion)
        .invert();
    }

    async function enableGyroscope() {
      if (gyroListenerAdded) {
        return gyroPermissionGranted;
      }

      if (
        typeof window.DeviceOrientationEvent ===
          "undefined"
      ) {
        return false;
      }

      try {
        if (
          typeof DeviceOrientationEvent
            .requestPermission === "function"
        ) {
          const permission =
            await DeviceOrientationEvent
              .requestPermission();

          if (permission !== "granted") {
            return false;
          }
        }

        window.addEventListener(
          "deviceorientation",
          handleDeviceOrientation,
          true
        );

        gyroListenerAdded = true;
        gyroPermissionGranted = true;

        return true;
      } catch (error) {
        console.error(
          "端末方向センサーを有効化できませんでした。",
          error
        );

        return false;
      }
    }

    function calibrateGyroscope() {
      gyroPivot.object3D.quaternion.identity();
      gyroTargetQuaternion.identity();

      if (gyroDataAvailable) {
        gyroReferenceQuaternion.copy(
          latestDeviceQuaternion
        );

        gyroReferenceReady = true;
      } else {
        gyroReferenceReady = false;
      }
    }

    function updateGyroscopeView() {
      if (
        screenLocked &&
        gyroReferenceReady
      ) {
        gyroPivot.object3D.quaternion.slerp(
          gyroTargetQuaternion,
          GYRO_SMOOTHING
        );
      }

      window.requestAnimationFrame(
        updateGyroscopeView
      );
    }

    function getVisibleWidthAtAnchorDepth() {
      const camera =
        cameraEl.getObject3D("camera");

      if (!camera) {
        return 1;
      }

      const depth =
        Math.max(
          0.1,
          Math.abs(
            screenAnchor.object3D.position.z
          )
        );

      const verticalFov =
        THREE.MathUtils.degToRad(
          camera.fov
        );

      const visibleHeight =
        2 *
        Math.tan(verticalFov / 2) *
        depth;

      const aspect =
        camera.aspect ||
        window.innerWidth /
          window.innerHeight;

      return visibleHeight * aspect;
    }

    /**
     * 車両のフロント方向を画面上の方向へ変換します。
     */
    function getVehicleFrontScreenDirection() {
      sceneEl.object3D.updateMatrixWorld(true);
      cameraEl.object3D.updateMatrixWorld(true);
      fixedCarRoot.object3D.updateMatrixWorld(true);

      const carWorldQuaternion =
        new THREE.Quaternion();

      const cameraWorldQuaternion =
        new THREE.Quaternion();

      fixedCarRoot.object3D
        .getWorldQuaternion(
          carWorldQuaternion
        );

      cameraEl.object3D
        .getWorldQuaternion(
          cameraWorldQuaternion
        );

      const direction =
        CAR_FRONT_LOCAL_AXIS
          .clone()
          .applyQuaternion(
            carWorldQuaternion
          )
          .applyQuaternion(
            cameraWorldQuaternion
              .clone()
              .invert()
          );

      direction.z = 0;

      if (direction.lengthSq() < 0.000001) {
        direction.set(-1, 0, 0);
      }

      return direction.normalize();
    }

    /**
     * 固定表示全体を車両フロント方向へ移動します。
     */
    function moveAllContentForward() {
      return new Promise((resolve) => {
        const startPosition =
          screenAnchor.object3D.position.clone();

        const visibleWidth =
          getVisibleWidthAtAnchorDepth();

        const moveDistance =
          visibleWidth *
          DEPARTURE_SCREEN_WIDTH_RATIO;

        const departureDirection =
          getVehicleFrontScreenDirection();

        const endPosition =
          startPosition
            .clone()
            .addScaledVector(
              departureDirection,
              moveDistance
            );

        const startTime =
          performance.now();

        const animate = (currentTime) => {
          const elapsed =
            currentTime - startTime;

          const progress =
            Math.min(
              elapsed /
                CAR_MOVE_DURATION,
              1
            );

          const eased =
            progress < 0.5
              ? 2 *
                progress *
                progress
              : 1 -
                Math.pow(
                  -2 * progress + 2,
                  2
                ) / 2;

          screenAnchor.object3D.position
            .lerpVectors(
              startPosition,
              endPosition,
              eased
            );

          if (progress < 1) {
            window.requestAnimationFrame(
              animate
            );

            return;
          }

          screenAnchor.object3D.position.copy(
            endPosition
          );

          resolve();
        };

        window.requestAnimationFrame(
          animate
        );
      });
    }

    async function moveDoor(open) {
      const doorComponent =
        fixedCarModel.components[
          "sliding-door"
        ];

      if (
        !doorComponent ||
        !doorComponent.doorObject
      ) {
        console.warn(
          "扉が見つからないため、扉の動きを省略します。"
        );

        return;
      }

      await doorComponent.moveDoor(open);
    }

    function resetExperienceObjects() {
      screenAnchor.object3D.position.copy(
        lockedAnchorPosition
      );

      fixedCarRoot.object3D.position.set(
        0,
        0,
        0
      );

      fixedCarRoot.object3D.quaternion.copy(
        lockedCarQuaternion
      );

      fixedCarRoot.object3D.scale.copy(
        lockedCarScale
      );

      const doorComponent =
        fixedCarModel.components[
          "sliding-door"
        ];

      if (
        doorComponent &&
        doorComponent.doorObject
      ) {
        doorComponent.isMoving = false;

        doorComponent.doorObject.position.copy(
          doorComponent.closedPosition
        );
      }
    }

    async function startExperience() {
      if (
        !fixedModelReady ||
        !screenLocked ||
        experienceRunning
      ) {
        return;
      }

      experienceRunning = true;
      startBtn.disabled = true;
      startBtn.style.display = "none";

      const gyroEnabled =
        await enableGyroscope();

      if (gyroEnabled) {
        calibrateGyroscope();

        statusBox.textContent =
          "表示位置は固定済みです。スマートフォンを傾けて見回せます";
      } else {
        statusBox.textContent =
          "表示位置は固定済みです。端末方向センサーは利用できません";
      }

      resetExperienceObjects();

      await moveDoor(true);

      showMessage(
        "① 予約番号をお伝えください"
      );

      await sleep(2000);

      showMessage(
        "② 料金は前払いになります"
      );

      await sleep(2000);

      await moveDoor(false);

      showMessage(
        "③ 目的地へ向かいます"
      );

      await sleep(800);

      await moveAllContentForward();

      showMessage(
        "目的地に到着しました"
      );

      await sleep(1200);

      await moveDoor(true);

      showMessage(
        "ご乗車ありがとうございました"
      );

      experienceRunning = false;
      startBtn.style.display = "block";
      updateStartButton();
    }

    fixedCarModel.addEventListener(
      "model-loaded",
      () => {
        fixedModelReady = true;

        /**
         * 固定用モデルは読み込み済みでも、
         * 認識まではアンカーごと非表示です。
         */
        screenAnchor.setAttribute(
          "visible",
          false
        );

        statusBox.textContent =
          "認識画像にスマートフォンをかざしてください";

        updateStartButton();
        scheduleScreenLock();
      }
    );

    target.addEventListener(
      "targetFound",
      () => {
        if (screenLocked) {
          return;
        }

        targetVisible = true;
        scheduleScreenLock();
      }
    );

    target.addEventListener(
      "targetLost",
      () => {
        if (screenLocked) {
          return;
        }

        targetVisible = false;

        statusBox.textContent =
          "もう一度、認識画像にかざしてください";

        updateStartButton();
      }
    );

    fixedCarModel.addEventListener(
      "door-not-found",
      () => {
        console.warn(
          "扉は動きませんが、車両表示と移動は実行できます。"
        );
      }
    );

    if (
      typeof window.DeviceOrientationEvent !==
        "undefined" &&
      typeof DeviceOrientationEvent
        .requestPermission !== "function"
    ) {
      enableGyroscope();
    }

    startBtn.addEventListener(
      "click",
      startExperience
    );

    window.addEventListener(
      "orientationchange",
      () => {
        window.setTimeout(
          () => {
            if (screenLocked) {
              screenAnchor.object3D.position.copy(
                getFixedScreenPosition()
              );

              lockedAnchorPosition.copy(
                screenAnchor.object3D.position
              );

              calibrateGyroscope();
            }
          },
          300
        );
      }
    );

    updateStartButton();
    updateGyroscopeView();
  </script>
</body>
</html>
