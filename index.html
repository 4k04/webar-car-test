<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">

  <title>WebAR Car Test</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #infoBox {
      position: fixed;
      left: 50%;
      bottom: 90px;
      transform: translateX(-50%);
      z-index: 999;

      box-sizing: border-box;
      width: min(90vw, 420px);
      padding: 12px 18px;

      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);

      color: #222;
      font-size: 16px;
      line-height: 1.5;
      text-align: center;

      display: none;
    }

    #startBtn {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 999;

      padding: 12px 24px;

      border: none;
      border-radius: 999px;

      background: #2d7ff9;
      color: #fff;

      font-size: 16px;
      cursor: pointer;
    }

    #startBtn:disabled {
      background: #888;
      cursor: default;
    }

    #statusBox {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;

      box-sizing: border-box;
      width: min(90vw, 420px);
      padding: 8px 14px;

      border-radius: 10px;
      background: rgba(0, 0, 0, 0.65);

      color: #fff;
      font-size: 14px;
      text-align: center;
    }
  </style>

  <script>
    /**
     * GLB内の扉オブジェクトをスライドさせます。
     *
     * Blender側の扉オブジェクト名は
     * Slide_Door
     * とします。
     */
    AFRAME.registerComponent("sliding-door", {
      schema: {
        doorName: {
          type: "string",
          default: "Slide_Door"
        },

        /**
         * 扉を開いたときの移動距離です。
         * 前回の-0.28から、少しだけ小さい-0.26へ変更。
         */
        openOffset: {
          type: "vec3",
          default: {
            x: -0.26,
            y: 0,
            z: 0
          }
        },

        duration: {
          type: "number",
          default: 1200
        }
      },

      init: function () {
        this.doorObject = null;
        this.closedPosition = new THREE.Vector3();
        this.openPosition = new THREE.Vector3();
        this.isMoving = false;

        this.el.addEventListener("model-loaded", () => {
          const model = this.el.getObject3D("mesh");

          if (!model) {
            console.error("GLBモデルを取得できませんでした。");
            return;
          }

          this.doorObject = model.getObjectByName(
            this.data.doorName
          );

          if (!this.doorObject) {
            console.warn(
              `扉オブジェクト「${this.data.doorName}」が見つかりません。`
            );

            this.el.emit("door-not-found");
            return;
          }

          this.closedPosition.copy(
            this.doorObject.position
          );

          this.openPosition
            .copy(this.closedPosition)
            .add(
              new THREE.Vector3(
                this.data.openOffset.x,
                this.data.openOffset.y,
                this.data.openOffset.z
              )
            );

          this.el.emit("door-ready");
        });
      },

      moveDoor: function (open) {
        if (!this.doorObject || this.isMoving) {
          return Promise.resolve(false);
        }

        this.isMoving = true;

        const startPosition =
          this.doorObject.position.clone();

        const endPosition = open
          ? this.openPosition.clone()
          : this.closedPosition.clone();

        const startTime = performance.now();
        const duration = this.data.duration;

        return new Promise((resolve) => {
          const animate = (currentTime) => {
            const elapsed = currentTime - startTime;

            const progress = Math.min(
              elapsed / duration,
              1
            );

            /**
             * 開始時と停止時を少し滑らかにします。
             */
            const eased =
              progress < 0.5
                ? 2 * progress * progress
                : 1 -
                  Math.pow(-2 * progress + 2, 2) / 2;

            this.doorObject.position.lerpVectors(
              startPosition,
              endPosition,
              eased
            );

            if (progress < 1) {
              requestAnimationFrame(animate);
              return;
            }

            this.doorObject.position.copy(
              endPosition
            );

            this.isMoving = false;
            resolve(true);
          };

          requestAnimationFrame(animate);
        });
      }
    });
  </script>
</head>

<body>
  <div id="statusBox">
    車両モデルを読み込んでいます
  </div>

  <div id="infoBox"></div>

  <button
    id="startBtn"
    type="button"
    disabled
  >
    読み込み中
  </button>

  <a-scene
    mindar-image="
      imageTargetSrc: ./targets.mind;
      autoStart: true;
      filterMinCF: 0.0001;
      filterBeta: 10;
      warmupTolerance: 5;
      missTolerance: 10;
    "
    renderer="
      colorManagement: true;
      physicallyCorrectLights: true;
      antialias: true;
    "
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false"
  >

    <!--
      GLBが約30MBあるため、
      読み込み猶予を長めにしています。
    -->
    <a-assets timeout="120000">
      <a-asset-item
        id="carAsset"
        src="./assets/car_test.glb"
      >
      </a-asset-item>
    </a-assets>

    <a-camera
      id="camera"
      position="0 0 0"
      look-controls="enabled: false"
    >
      <!--
        認識後、車両をこのアンカーへ移します。
        カメラの子なので画面上の表示位置が固定されます。
      -->
      <a-entity
        id="screenAnchor"
        visible="false"
      >
        <!--
          スマートフォンの向きに応じた回転だけを担当します。
        -->
        <a-entity id="gyroPivot"></a-entity>
      </a-entity>
    </a-camera>

    <!-- 車体全体を明るくする光 -->
    <a-light
      type="ambient"
      intensity="1.2"
    >
    </a-light>

    <!-- 太陽光に近い方向性のある光 -->
    <a-light
      type="directional"
      intensity="1.1"
      position="1 3 2"
    >
    </a-light>

    <a-entity
      id="target"
      mindar-image-target="targetIndex: 0"
    >

      <!--
        認識中は、これまでどおり認識画像を基準に表示します。
        スタート時に画面固定用アンカーへ移動します。
      -->
      <a-entity
        id="carRoot"
        position="0.3 0 0.12"
        rotation="-90 0 180"
        scale="0.20 0.20 0.20"
      >

        <a-gltf-model
          id="carModel"
          src="#carAsset"
          sliding-door="
            doorName: Slide_Door;
            openOffset: -0.26 0 0;
            duration: 1200;
          "
        >
        </a-gltf-model>

      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    const infoBox =
      document.getElementById("infoBox");

    const statusBox =
      document.getElementById("statusBox");

    const startBtn =
      document.getElementById("startBtn");

    const sceneEl =
      document.querySelector("a-scene");

    const cameraEl =
      document.getElementById("camera");

    const target =
      document.getElementById("target");

    const screenAnchor =
      document.getElementById("screenAnchor");

    const gyroPivot =
      document.getElementById("gyroPivot");

    const carRoot =
      document.getElementById("carRoot");

    const carModel =
      document.getElementById("carModel");

    let arSystem = null;
    let modelReady = false;
    let targetVisible = false;
    let experienceRunning = false;
    let trackingPaused = false;
    let screenLocked = false;

    let gyroListenerAdded = false;
    let gyroPermissionGranted = false;
    let gyroDataAvailable = false;
    let gyroReferenceReady = false;

    /**
     * 画面固定後の車両移動量です。
     * カメラ座標のX方向へ0.25だけ移動します。
     */
    const CAR_MOVE_DISTANCE = 0.25;
    const CAR_MOVE_DURATION = 3000;

    /**
     * ジャイロ回転の追従率です。
     * 大きいほど素早く、小さいほど滑らかになります。
     */
    const GYRO_SMOOTHING = 0.12;

    const lockedAnchorPosition =
      new THREE.Vector3();

    const lockedCarQuaternion =
      new THREE.Quaternion();

    const lockedCarScale =
      new THREE.Vector3(1, 1, 1);

    const latestDeviceQuaternion =
      new THREE.Quaternion();

    const gyroReferenceQuaternion =
      new THREE.Quaternion();

    const gyroRelativeQuaternion =
      new THREE.Quaternion();

    const gyroTargetQuaternion =
      new THREE.Quaternion();

    const deviceEuler =
      new THREE.Euler();

    const screenRotationQuaternion =
      new THREE.Quaternion();

    const deviceCameraCorrection =
      new THREE.Quaternion(
        -Math.sqrt(0.5),
        0,
        0,
        Math.sqrt(0.5)
      );

    const deviceZAxis =
      new THREE.Vector3(0, 0, 1);

    function sleep(ms) {
      return new Promise((resolve) => {
        window.setTimeout(resolve, ms);
      });
    }

    function showMessage(text) {
      infoBox.textContent = text;
      infoBox.style.display = "block";
    }

    /**
     * 読み込み状態と認識状態に合わせて、
     * スタートボタンを更新します。
     */
    function updateStartButton() {
      if (experienceRunning) {
        startBtn.disabled = true;
        return;
      }

      if (!modelReady) {
        startBtn.disabled = true;
        startBtn.textContent = "読み込み中";
        return;
      }

      if (!arSystem) {
        startBtn.disabled = true;
        startBtn.textContent = "AR準備中";
        return;
      }

      if (!targetVisible && !screenLocked) {
        startBtn.disabled = true;
        startBtn.textContent =
          "認識画像を映してください";
        return;
      }

      startBtn.disabled = false;
      startBtn.textContent = screenLocked
        ? "もう一度体験"
        : "体験スタート";
    }

    /**
     * 認識中だけ、端末の向きに合わせて
     * 車両の表示サイズを変更します。
     *
     * 画面固定後は、認識時のサイズを維持します。
     */
    function adjustCarScale() {
      if (screenLocked) {
        return;
      }

      const isPortrait =
        window.innerHeight > window.innerWidth;

      if (isPortrait) {
        carRoot.setAttribute(
          "scale",
          "0.20 0.20 0.20"
        );
      } else {
        carRoot.setAttribute(
          "scale",
          "0.28 0.28 0.28"
        );
      }
    }

    /**
     * 端末の向きをThree.jsのQuaternionへ変換します。
     */
    function createDeviceQuaternion(event) {
      const alpha = THREE.MathUtils.degToRad(
        event.alpha || 0
      );

      const beta = THREE.MathUtils.degToRad(
        event.beta || 0
      );

      const gamma = THREE.MathUtils.degToRad(
        event.gamma || 0
      );

      let screenAngle = 0;

      if (
        window.screen.orientation &&
        typeof window.screen.orientation.angle === "number"
      ) {
        screenAngle =
          window.screen.orientation.angle;
      } else if (
        typeof window.orientation === "number"
      ) {
        screenAngle =
          window.orientation;
      }

      const orientation =
        THREE.MathUtils.degToRad(screenAngle);

      deviceEuler.set(
        beta,
        alpha,
        -gamma,
        "YXZ"
      );

      const quaternion =
        new THREE.Quaternion();

      quaternion.setFromEuler(deviceEuler);
      quaternion.multiply(deviceCameraCorrection);

      screenRotationQuaternion.setFromAxisAngle(
        deviceZAxis,
        -orientation
      );

      quaternion.multiply(
        screenRotationQuaternion
      );

      return quaternion.normalize();
    }

    /**
     * 端末の向きが更新された時に呼び出されます。
     */
    function handleDeviceOrientation(event) {
      if (
        event.alpha === null &&
        event.beta === null &&
        event.gamma === null
      ) {
        return;
      }

      latestDeviceQuaternion.copy(
        createDeviceQuaternion(event)
      );

      gyroDataAvailable = true;

      if (!screenLocked) {
        return;
      }

      if (!gyroReferenceReady) {
        gyroReferenceQuaternion.copy(
          latestDeviceQuaternion
        );

        gyroReferenceReady = true;
        return;
      }

      /**
       * 認識時の端末角度から、
       * 現在どれだけ向きが変わったかを求めます。
       */
      gyroRelativeQuaternion
        .copy(gyroReferenceQuaternion)
        .invert()
        .multiply(latestDeviceQuaternion);

      /**
       * 端末が右を向いた時に、
       * 車両は逆方向へ回転させます。
       *
       * これにより、画面位置を固定したまま
       * 車両の反対側を見ているように見せます。
       */
      gyroTargetQuaternion
        .copy(gyroRelativeQuaternion)
        .invert();
    }

    /**
     * iPhone等で必要なセンサー許可を取得します。
     * Android等、許可APIがない端末では
     * そのままイベントを登録します。
     */
    async function enableGyroscope() {
      if (gyroListenerAdded) {
        return gyroPermissionGranted;
      }

      if (
        typeof window.DeviceOrientationEvent ===
        "undefined"
      ) {
        console.warn(
          "この端末は端末方向センサーに対応していません。"
        );

        return false;
      }

      try {
        if (
          typeof DeviceOrientationEvent
            .requestPermission === "function"
        ) {
          const permission =
            await DeviceOrientationEvent
              .requestPermission();

          if (permission !== "granted") {
            console.warn(
              "端末方向センサーの利用が許可されませんでした。"
            );

            return false;
          }
        }

        window.addEventListener(
          "deviceorientation",
          handleDeviceOrientation,
          true
        );

        gyroListenerAdded = true;
        gyroPermissionGranted = true;

        return true;
      } catch (error) {
        console.error(
          "端末方向センサーの許可取得に失敗しました。",
          error
        );

        return false;
      }
    }

    /**
     * 現在の端末角度を基準角度として保存します。
     */
    function calibrateGyroscope() {
      gyroPivot.object3D.quaternion.identity();
      gyroTargetQuaternion.identity();

      if (gyroDataAvailable) {
        gyroReferenceQuaternion.copy(
          latestDeviceQuaternion
        );

        gyroReferenceReady = true;
      } else {
        gyroReferenceReady = false;
      }
    }

    /**
     * 認識画像上にある車両の現在の
     * ワールド位置・回転・大きさを取得し、
     * カメラ配下の固定アンカーへ移します。
     */
    function lockCarToScreen() {
      if (screenLocked) {
        return true;
      }

      if (
        !cameraEl.object3D ||
        !screenAnchor.object3D ||
        !gyroPivot.object3D ||
        !carRoot.object3D
      ) {
        console.error(
          "画面固定に必要な3Dオブジェクトを取得できません。"
        );

        return false;
      }

      sceneEl.object3D.updateMatrixWorld(true);
      cameraEl.object3D.updateMatrixWorld(true);
      carRoot.object3D.updateMatrixWorld(true);

      const worldPosition =
        new THREE.Vector3();

      const worldQuaternion =
        new THREE.Quaternion();

      const worldScale =
        new THREE.Vector3();

      const cameraWorldQuaternion =
        new THREE.Quaternion();

      carRoot.object3D.getWorldPosition(
        worldPosition
      );

      carRoot.object3D.getWorldQuaternion(
        worldQuaternion
      );

      carRoot.object3D.getWorldScale(
        worldScale
      );

      cameraEl.object3D.getWorldQuaternion(
        cameraWorldQuaternion
      );

      /**
       * 車両の現在位置を、
       * カメラのローカル座標へ変換します。
       */
      const cameraLocalPosition =
        worldPosition.clone();

      cameraEl.object3D.worldToLocal(
        cameraLocalPosition
      );

      /**
       * 万一カメラの後ろ側として計算された場合は、
       * 前方2m相当の位置へ補正します。
       */
      if (cameraLocalPosition.z >= -0.05) {
        cameraLocalPosition.z = -2;
      }

      /**
       * 車両のワールド回転を、
       * カメラ基準のローカル回転へ変換します。
       */
      const cameraLocalQuaternion =
        cameraWorldQuaternion
          .clone()
          .invert()
          .multiply(worldQuaternion);

      screenAnchor.object3D.position.copy(
        cameraLocalPosition
      );

      screenAnchor.object3D.quaternion.identity();
      screenAnchor.object3D.scale.set(1, 1, 1);

      gyroPivot.object3D.position.set(0, 0, 0);
      gyroPivot.object3D.quaternion.identity();
      gyroPivot.object3D.scale.set(1, 1, 1);

      /**
       * DOM上ではtargetの子のままですが、
       * Three.js上ではgyroPivotの子へ移します。
       */
      gyroPivot.object3D.add(
        carRoot.object3D
      );

      carRoot.object3D.position.set(0, 0, 0);
      carRoot.object3D.quaternion.copy(
        cameraLocalQuaternion
      );
      carRoot.object3D.scale.copy(
        worldScale
      );

      lockedAnchorPosition.copy(
        screenAnchor.object3D.position
      );

      lockedCarQuaternion.copy(
        carRoot.object3D.quaternion
      );

      lockedCarScale.copy(
        carRoot.object3D.scale
      );

      screenAnchor.object3D.visible = true;
      screenAnchor.setAttribute(
        "visible",
        true
      );

      screenLocked = true;
      calibrateGyroscope();

      return true;
    }

    /**
     * ジャイロによる目標回転へ、
     * 毎フレーム滑らかに近づけます。
     */
    function updateGyroscopeView() {
      if (
        screenLocked &&
        gyroReferenceReady
      ) {
        gyroPivot.object3D.quaternion.slerp(
          gyroTargetQuaternion,
          GYRO_SMOOTHING
        );
      }

      window.requestAnimationFrame(
        updateGyroscopeView
      );
    }

    /**
     * 車両を画面左方向へ移動させます。
     */
    function moveCar() {
      return new Promise((resolve) => {
        const startPosition =
          lockedAnchorPosition.clone();

        const endPosition =
          lockedAnchorPosition.clone();

        endPosition.x -= CAR_MOVE_DISTANCE;

        const startTime = performance.now();

        const animate = (currentTime) => {
          const elapsed =
            currentTime - startTime;

          const progress = Math.min(
            elapsed / CAR_MOVE_DURATION,
            1
          );

          screenAnchor.object3D.position.lerpVectors(
            startPosition,
            endPosition,
            progress
          );

          if (progress < 1) {
            window.requestAnimationFrame(
              animate
            );

            return;
          }

          screenAnchor.object3D.position.copy(
            endPosition
          );

          resolve();
        };

        window.requestAnimationFrame(
          animate
        );
      });
    }

    /**
     * 扉の開閉を実行します。
     */
    async function moveDoor(open) {
      const doorComponent =
        carModel.components["sliding-door"];

      if (
        !doorComponent ||
        !doorComponent.doorObject
      ) {
        console.warn(
          "扉が見つからないため、扉の動きを省略します。"
        );

        return;
      }

      await doorComponent.moveDoor(open);
    }

    /**
     * 車両と扉を開始状態へ戻します。
     */
    function resetExperienceObjects() {
      if (screenLocked) {
        screenAnchor.object3D.position.copy(
          lockedAnchorPosition
        );

        carRoot.object3D.position.set(0, 0, 0);
        carRoot.object3D.quaternion.copy(
          lockedCarQuaternion
        );
        carRoot.object3D.scale.copy(
          lockedCarScale
        );
      }

      const doorComponent =
        carModel.components["sliding-door"];

      if (
        doorComponent &&
        doorComponent.doorObject
      ) {
        doorComponent.isMoving = false;

        doorComponent.doorObject.position.copy(
          doorComponent.closedPosition
        );
      }
    }

    /**
     * 体験の一連の流れです。
     */
    async function startExperience() {
      if (
        !modelReady ||
        !arSystem ||
        experienceRunning ||
        (!targetVisible && !screenLocked)
      ) {
        return;
      }

      experienceRunning = true;

      startBtn.disabled = true;
      startBtn.style.display = "none";

      /**
       * iPhoneではクリック操作中に
       * センサー許可を要求する必要があります。
       */
      const gyroEnabled =
        await enableGyroscope();

      /**
       * 許可画面の表示中に認識画像を外した場合は、
       * 固定せず認識からやり直します。
       */
      if (
        !screenLocked &&
        !targetVisible
      ) {
        experienceRunning = false;

        startBtn.style.display = "block";

        statusBox.textContent =
          "もう一度、認識画像にかざしてください";

        updateStartButton();
        return;
      }

      if (!screenLocked) {
        const locked =
          lockCarToScreen();

        if (!locked) {
          experienceRunning = false;

          startBtn.style.display = "block";

          statusBox.textContent =
            "画面固定に失敗しました";

          updateStartButton();
          return;
        }

        /**
         * 車両をカメラ側へ移した後に、
         * MindARの画像追跡を停止します。
         * カメラ映像は表示したままです。
         */
        arSystem.pause(true);
        trackingPaused = true;
      }

      resetExperienceObjects();

      if (gyroEnabled) {
        statusBox.textContent =
          "表示位置を固定しました。スマートフォンをゆっくり傾けて見回せます";
      } else {
        statusBox.textContent =
          "表示位置を固定しました。端末方向センサーは利用できません";
      }

      /**
       * 乗車前に扉を開きます。
       */
      await moveDoor(true);

      showMessage(
        "① 予約番号をお伝えください"
      );

      await sleep(2000);

      showMessage(
        "② 料金は前払いになります"
      );

      await sleep(2000);

      /**
       * 出発前に扉を閉じます。
       */
      await moveDoor(false);

      showMessage(
        "③ 目的地へ向かいます"
      );

      await sleep(800);

      await moveCar();

      showMessage(
        "目的地に到着しました"
      );

      await sleep(1200);

      /**
       * 到着後に扉を開きます。
       */
      await moveDoor(true);

      showMessage(
        "ご乗車ありがとうございました"
      );

      experienceRunning = false;

      startBtn.style.display = "block";
      updateStartButton();
    }

    /**
     * GLBの読み込み完了時
     */
    carModel.addEventListener(
      "model-loaded",
      () => {
        modelReady = true;

        statusBox.textContent =
          "認識画像にスマートフォンをかざしてください";

        adjustCarScale();
        updateStartButton();
      }
    );

    /**
     * 認識画像を検出したとき
     */
    target.addEventListener(
      "targetFound",
      () => {
        if (trackingPaused) {
          return;
        }

        targetVisible = true;

        statusBox.textContent =
          "認識画像を検出しました";

        updateStartButton();
      }
    );

    /**
     * 認識画像を見失ったとき
     */
    target.addEventListener(
      "targetLost",
      () => {
        if (trackingPaused) {
          return;
        }

        targetVisible = false;

        statusBox.textContent =
          "もう一度、認識画像にかざしてください";

        updateStartButton();
      }
    );

    /**
     * 扉オブジェクトが見つからなかった場合
     */
    carModel.addEventListener(
      "door-not-found",
      () => {
        console.warn(
          "扉は動きませんが、車両表示と移動は実行できます。"
        );
      }
    );

    function initializeArSystem() {
      arSystem =
        sceneEl.systems["mindar-image-system"];

      updateStartButton();
    }

    if (sceneEl.hasLoaded) {
      initializeArSystem();
    } else {
      sceneEl.addEventListener(
        "loaded",
        initializeArSystem,
        { once: true }
      );
    }

    startBtn.addEventListener(
      "click",
      startExperience
    );

    window.addEventListener(
      "resize",
      adjustCarScale
    );

    window.addEventListener(
      "orientationchange",
      () => {
        window.setTimeout(
          () => {
            if (screenLocked) {
              calibrateGyroscope();
            } else {
              adjustCarScale();
            }
          },
          300
        );
      }
    );

    adjustCarScale();
    updateStartButton();
    updateGyroscopeView();
  </script>
</body>
</html>
