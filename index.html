<!doctype html>

<html lang="ja">
<head>
  <meta charset="utf-8">

  <title>WebAR Car Test</title>

<metaname="viewport"content="width=device-width, initial-scale=1, viewport-fit=cover"



  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #infoBox {
      position: fixed;
      left: 50%;
      bottom: 90px;
      transform: translateX(-50%);
      z-index: 999;

      box-sizing: border-box;
      width: min(90vw, 420px);
      padding: 12px 18px;

      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);

      color: #222;
      font-size: 16px;
      line-height: 1.5;
      text-align: center;

      display: none;
    }

    #startBtn {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 999;

      padding: 12px 24px;

      border: none;
      border-radius: 999px;

      background: #2d7ff9;
      color: #fff;

      font-size: 16px;
      cursor: pointer;
    }

    #startBtn:disabled {
      background: #888;
      cursor: default;
    }

    #statusBox {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;

      box-sizing: border-box;
      width: min(90vw, 420px);
      padding: 8px 14px;

      border-radius: 10px;
      background: rgba(0, 0, 0, 0.65);

      color: #fff;
      font-size: 14px;
      text-align: center;
    }
  </style>
